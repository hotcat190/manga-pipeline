services:
  rabbitmq:
    image: rabbitmq:management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    networks:
      - comic-network
    

  manga-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manga-pipeline
    env_file:
      - .env
    environment:
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-admin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-password123}"
      MINIO_PUBLIC_BASE_URL: "http://localhost:9000/comic"
      HF_TOKEN: "${HF_TOKEN}"
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - comic-network

networks:
  comic-network:
    external: true  