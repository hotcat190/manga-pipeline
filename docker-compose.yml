services:
  rabbitmq:
    image: rabbitmq:management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

  manga-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manga-pipeline
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_started

      